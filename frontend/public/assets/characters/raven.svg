<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="raven-bg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3D7A8A"/>
      <stop offset="100%" stop-color="#264653"/>
    </radialGradient>
    <radialGradient id="raven-inner" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#2F6070"/>
      <stop offset="100%" stop-color="#1A333D"/>
    </radialGradient>
  </defs>
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="96" fill="#1A333D" stroke="#0F1F26" stroke-width="3"/>
  <!-- Main background -->
  <circle cx="100" cy="100" r="88" fill="url(#raven-bg)"/>
  <!-- Victorian ornamental ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFF" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>
  <!-- Victorian flourish accents -->
  <path d="M50 42 Q55 38 60 42 Q55 46 50 42Z" fill="#FFF" opacity="0.15"/>
  <path d="M140 42 Q145 38 150 42 Q145 46 140 42Z" fill="#FFF" opacity="0.15"/>
  <!-- Ornate top arc -->
  <path d="M70 30 Q85 24 100 28 Q115 24 130 30" fill="none" stroke="#FFF" stroke-width="1" opacity="0.15"/>
  <!-- Small decorative dots -->
  <circle cx="45" cy="80" r="2" fill="#FFF" opacity="0.12"/>
  <circle cx="155" cy="80" r="2" fill="#FFF" opacity="0.12"/>
  <circle cx="45" cy="120" r="2" fill="#FFF" opacity="0.12"/>
  <circle cx="155" cy="120" r="2" fill="#FFF" opacity="0.12"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="70" fill="url(#raven-inner)" opacity="0.4"/>
  <!-- Character initial -->
  <text x="100" y="118" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">R</text>
  <!-- Victorian ornamental bottom -->
  <path d="M60 158 Q70 165 80 160 Q90 168 100 162 Q110 168 120 160 Q130 165 140 158" fill="none" stroke="#FFF" stroke-width="1" opacity="0.2"/>
</svg>
