<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="nova-bg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#9B5DE5"/>
      <stop offset="100%" stop-color="#7209B7"/>
    </radialGradient>
    <radialGradient id="nova-inner" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#560BAD"/>
    </radialGradient>
    <linearGradient id="nova-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0AAFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7209B7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="96" fill="#560BAD" stroke="#3A0CA3" stroke-width="3"/>
  <!-- Main background -->
  <circle cx="100" cy="100" r="88" fill="url(#nova-bg)"/>
  <!-- Cyberpunk circuit lines -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#E0AAFF" stroke-width="1" opacity="0.2"/>
  <line x1="30" y1="100" x2="50" y2="100" stroke="#E0AAFF" stroke-width="1" opacity="0.25"/>
  <line x1="150" y1="100" x2="170" y2="100" stroke="#E0AAFF" stroke-width="1" opacity="0.25"/>
  <line x1="100" y1="30" x2="100" y2="45" stroke="#E0AAFF" stroke-width="1" opacity="0.25"/>
  <line x1="100" y1="155" x2="100" y2="170" stroke="#E0AAFF" stroke-width="1" opacity="0.25"/>
  <!-- Digital glow corners -->
  <rect x="38" y="38" width="12" height="2" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <rect x="38" y="38" width="2" height="12" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <rect x="150" y="38" width="12" height="2" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <rect x="160" y="38" width="2" height="12" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <rect x="38" y="160" width="12" height="2" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <rect x="38" y="150" width="2" height="12" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <rect x="150" y="160" width="12" height="2" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <rect x="160" y="150" width="2" height="12" rx="1" fill="#E0AAFF" opacity="0.2"/>
  <!-- Inner circle with glow -->
  <circle cx="100" cy="100" r="70" fill="url(#nova-inner)" opacity="0.4"/>
  <circle cx="100" cy="100" r="70" fill="url(#nova-glow)"/>
  <!-- Character initial -->
  <text x="100" y="118" font-family="'Courier New', monospace" font-size="88" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">N</text>
  <!-- Tech accent -->
  <line x1="70" y1="155" x2="130" y2="155" stroke="#E0AAFF" stroke-width="1" opacity="0.3"/>
</svg>
