<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="khan-bg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </radialGradient>
    <radialGradient id="khan-inner" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </radialGradient>
  </defs>
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="96" fill="#1B4332" stroke="#0B2618" stroke-width="3"/>
  <!-- Main background -->
  <circle cx="100" cy="100" r="88" fill="url(#khan-bg)"/>
  <!-- Islamic geometric-inspired decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.15"/>
  <!-- Star/geometric accents -->
  <polygon points="100,28 103,36 100,34 97,36" fill="#FFF" opacity="0.25"/>
  <polygon points="100,172 103,164 100,166 97,164" fill="#FFF" opacity="0.25"/>
  <polygon points="28,100 36,97 34,100 36,103" fill="#FFF" opacity="0.25"/>
  <polygon points="172,100 164,97 166,100 164,103" fill="#FFF" opacity="0.25"/>
  <!-- Crescent accent marks -->
  <path d="M55 45 Q48 55 55 65" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
  <path d="M145 45 Q152 55 145 65" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="70" fill="url(#khan-inner)" opacity="0.4"/>
  <!-- Character initial -->
  <text x="100" y="118" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">K</text>
  <!-- Ornamental bottom curve -->
  <path d="M65 155 Q82 162 100 158 Q118 162 135 155" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
</svg>
