<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="rukia-bg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E63946"/>
    </radialGradient>
    <radialGradient id="rukia-inner" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#FF4D5A"/>
      <stop offset="100%" stop-color="#C1121F"/>
    </radialGradient>
  </defs>
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="96" fill="#9D0208" stroke="#6A040F" stroke-width="3"/>
  <!-- Main background -->
  <circle cx="100" cy="100" r="88" fill="url(#rukia-bg)"/>
  <!-- Inner decorative ring - Japanese-inspired -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#C1121F" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Corner accents - torii gate inspired marks -->
  <line x1="50" y1="35" x2="50" y2="55" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <line x1="150" y1="35" x2="150" y2="55" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <line x1="45" y1="35" x2="55" y2="35" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <line x1="145" y1="35" x2="155" y2="35" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="70" fill="url(#rukia-inner)" opacity="0.4"/>
  <!-- Character initial -->
  <text x="100" y="118" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">R</text>
  <!-- Subtle bottom accent -->
  <path d="M60 155 Q100 170 140 155" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.25"/>
</svg>
