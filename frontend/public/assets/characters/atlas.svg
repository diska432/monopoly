<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="atlas-bg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6AADCF"/>
      <stop offset="100%" stop-color="#457B9D"/>
    </radialGradient>
    <radialGradient id="atlas-inner" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#5A9DBF"/>
      <stop offset="100%" stop-color="#2C5F7A"/>
    </radialGradient>
  </defs>
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="96" fill="#2C5F7A" stroke="#1D3557" stroke-width="3"/>
  <!-- Main background -->
  <circle cx="100" cy="100" r="88" fill="url(#atlas-bg)"/>
  <!-- Greek key pattern - simplified decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#FFF" stroke-width="1" opacity="0.15"/>
  <!-- Greek column accents -->
  <rect x="42" y="40" width="6" height="30" rx="2" fill="#FFF" opacity="0.2"/>
  <rect x="152" y="40" width="6" height="30" rx="2" fill="#FFF" opacity="0.2"/>
  <rect x="40" y="38" width="10" height="4" rx="1" fill="#FFF" opacity="0.2"/>
  <rect x="150" y="38" width="10" height="4" rx="1" fill="#FFF" opacity="0.2"/>
  <rect x="40" y="70" width="10" height="4" rx="1" fill="#FFF" opacity="0.2"/>
  <rect x="150" y="70" width="10" height="4" rx="1" fill="#FFF" opacity="0.2"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="70" fill="url(#atlas-inner)" opacity="0.4"/>
  <!-- Character initial -->
  <text x="100" y="118" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">A</text>
  <!-- Laurel accent bottom -->
  <path d="M65 155 Q80 165 100 160 Q120 165 135 155" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.25"/>
</svg>
